services:
  - type: web
    name: bell-meal-planner
    env: node
    region: oregon
    buildCommand: npm install && cd client && npm install && cd .. && npm run build
    startCommand: npm start
    disk:
      name: bell-planner-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NOTIFY_GMAIL_USER
        sync: false
      - key: NOTIFY_GMAIL_APP_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: RENDER_DATA_DIR
        value: /data
      - key: DATA_DIR
        value: /data
